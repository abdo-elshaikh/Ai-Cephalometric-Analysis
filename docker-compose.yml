services:
  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: ceph_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: cephanalysis_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: admin
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/seed.sql:/docker-entrypoint-initdb.d/seed.sql
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ceph_user -d cephanalysis_db" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis ───────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: ceph_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── .NET API ────────────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    container_name: ceph_api
    restart: unless-stopped
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ConnectionStrings__DefaultConnection=Host=postgres;Port=5432;Database=cephanalysis_db;Username=postgres;Password=admin
      - Jwt__SecretKey=${JWT_SECRET_KEY}
      - Security__EncryptionKey=${PII_ENCRYPTION_KEY}
      - AiService__BaseUrl=http://ai_service:8000
      - AiService__ServiceKey=${AI_SERVICE_KEY}
      - Redis__ConnectionString=redis:6379
    ports:
      - "5000:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - uploads_data:/app/uploads

  # ── Python AI Microservice ──────────────────────────────────────────────────
  ai_service:
    build:
      context: ./ai_service
      dockerfile: ../docker/Dockerfile.ai
    container_name: ceph_ai
    restart: unless-stopped
    environment:
      - AI_SERVICE_KEY=${AI_SERVICE_KEY}
      - AI_MODEL_PATH=/app/model/model.pth
      - AI_DEVICE=cpu
      - AI_OPENAI_API_KEY=${OPENAI_API_KEY}
    ports:
      - "8000:8000"
    volumes:
      - ./ai_service/models:/app/model
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8000/health" ]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── React Frontend (dev) ────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: ../docker/Dockerfile.frontend
    container_name: ceph_frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - VITE_API_URL=http://localhost:5000
    depends_on:
      - api

volumes:
  postgres_data:
  redis_data:
  uploads_data:
